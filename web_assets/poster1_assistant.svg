<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <rect x="4" y="4" width="792" height="452" rx="12" fill="#0e0e0e" stroke="#242424"/>
  <!-- title bar -->
  <circle cx="26" cy="24" r="6" fill="#ff5f56"/><circle cx="46" cy="24" r="6" fill="#ffbd2e"/><circle cx="66" cy="24" r="6" fill="#27c93f"/>
  <text x="92" y="29" font-size="13" fill="#8a8a8a">demo1_assistant.py  —  SAGE Personal Memory Assistant</text>
  <line x1="4" y1="44" x2="796" y2="44" stroke="#242424"/>
  <!-- body -->
  <g font-size="13.5">
    <text x="28" y="82"><tspan fill="#4fc3f7">you&gt; </tspan><tspan fill="#d8dde1">the weekly deployment runs every Tuesday at 09:00 UTC</tspan></text>
    <text x="28" y="108" fill="#6b7177">  SAGE: stored new memory -&gt; slot 3  (1/256 used)</text>
    <text x="28" y="142"><tspan fill="#4fc3f7">you&gt; </tspan><tspan fill="#d8dde1">/off</tspan></text>
    <text x="28" y="168" fill="#ff7043">[LLM: OFF]  LLM disabled — answering from SAGE memory only</text>
    <text x="28" y="202"><tspan fill="#4fc3f7">you&gt; </tspan><tspan fill="#d8dde1">when does the weekly deployment run?</tspan></text>
    <text x="28" y="228" fill="#9a6cff">  SAGE recall  0.71  <tspan fill="#6b7177">the weekly deployment runs every Tuesday at 09:00 UTC</tspan></text>
    <text x="28" y="262"><tspan fill="#ffd166">assistant&gt; </tspan><tspan fill="#ffd166">[from memory] the weekly deployment runs every Tuesday at 09:00 UTC</tspan></text>
    <text x="28" y="296" fill="#27c93f">  answered with NO LLM and NO connection.</text>
  </g>
  <!-- play affordance -->
  <circle cx="744" cy="358" r="22" fill="#000000" opacity="0.5"/>
  <circle cx="744" cy="358" r="22" fill="none" stroke="#26c6da" stroke-width="1.5"/>
  <path d="M737 347 L758 358 L737 369 Z" fill="#26c6da"/>
  <!-- caption -->
  <line x1="4" y1="404" x2="796" y2="404" stroke="#242424"/>
  <text x="28" y="432" font-size="15" font-weight="700" fill="#26c6da">Case study 1 — Personal memory assistant</text>
  <text x="28" y="449" font-size="12" fill="#8a8a8a">Remembers across sessions; keeps answering when the LLM is switched off.</text>
</svg>
